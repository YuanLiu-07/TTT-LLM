<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>井字棋 vs AI（LLM）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>井字棋 · 你是 X，对手是 LLM（O）</h1>
      <p class="hint">
        本地开发请使用 <code>vercel dev</code>，线上需在 Vercel 配置
        <code>OPENAI_API_KEY</code>。
      </p>
      <div id="status" class="status">轮到你（X）</div>
      <div id="board" class="board" aria-label="井字棋棋盘"></div>
      <div class="actions">
        <button type="button" id="reset">重新开始</button>
      </div>
      <p id="error" class="error" role="alert" hidden></p>
    </main>
    <script src="config.js"></script>
    <script src="game.js"></script>
  </body>
</html>
