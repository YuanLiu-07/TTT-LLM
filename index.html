<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tic-Tac-Toe vs LLM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <main class="wrap">
      <header class="top-bar">
        <span class="logo-dot" aria-hidden="true"></span>
        <span class="logo-text">TTT</span>
      </header>
      <section class="card">
        <p class="byline">Yuan Liu · ID 1306116</p>
        <h1>Tic-Tac-Toe</h1>
        <p class="subtitle">You are <strong>X</strong> · Opponent is <strong>O</strong> (LLM)</p>
        <p class="hint">
          Local: <code>vercel dev</code> · Production: set
          <code>OPENAI_API_KEY</code> in Vercel.
        </p>
        <div id="status" class="status">Your turn (X)</div>
        <div id="board" class="board" aria-label="Tic-tac-toe board"></div>
        <div class="actions">
          <button type="button" id="reset">New game</button>
        </div>
        <p id="error" class="error" role="alert" hidden></p>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="game.js"></script>
  </body>
</html>
