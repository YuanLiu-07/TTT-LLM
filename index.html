<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tic-Tac-Toe vs LLM</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <p class="byline">Yuan Liu · ID 1306116</p>
      <h1>Tic-Tac-Toe — You are X, opponent is O (LLM)</h1>
      <p class="hint">
        Local dev: <code>vercel dev</code>. Production: set
        <code>OPENAI_API_KEY</code> in Vercel project settings.
      </p>
      <div id="status" class="status">Your turn (X)</div>
      <div id="board" class="board" aria-label="Tic-tac-toe board"></div>
      <div class="actions">
        <button type="button" id="reset">New game</button>
      </div>
      <p id="error" class="error" role="alert" hidden></p>
    </main>
    <script src="config.js"></script>
    <script src="game.js"></script>
  </body>
</html>
